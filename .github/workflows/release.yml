  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true

      # go-semantic-release derives the next version from the conventional
      # commits, creates the tag and GitHub release, then its goreleaser hook
      # builds and uploads the cross-platform artifacts.
      - name: Semantic release
        uses: go-semantic-release/action@v1
        with:
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
